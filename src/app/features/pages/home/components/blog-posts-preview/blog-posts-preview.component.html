<section>
    <h2 class="fs-1 fw-500">{{"blog_posts_preview_title" | translate}}</h2>
    <div class="row row-gap-4 mt-4">
        <span class="col-sm-6 col-lg-3" *ngFor="let item of posts() | randomItems:4">
            <app-blog-post [_id]="item['id']" [title]="item['title']" [image]="item['images'][0]"
                [created_at]="item['created_at']" [category]="item['category']"></app-blog-post>
        </span>
    </div>
</section>
