<div class="w-100 home-page-shell">
    <ng-container>
        <app-cookies-banner></app-cookies-banner>
        <!-- <div class="d-none d-lg-block">
            <app-referral-ad></app-referral-ad>
        </div> -->
        <app-main></app-main>

        <div class="mt-5 pt-lg-5 home-section" id="home-explore">
            <div class="pt-lg-5">
                <app-referral></app-referral>
            </div>
        </div>

        <div class="container-xl mt-5 home-section">
            <div class="row row-gap-4">
                <span class="col-12 col-lg-6" *ngFor="let item of data; let i = index">
                    <div [ngClass]="item.background" class="rounded-4 text-white h-100 p-4">
                        <div class="row justify-content-between">
                            <span class="col-sm-8 col-md-8 col-lg-7">
                                <div>
                                    <div class="fs-4 fw-600">{{item.label | translate}}</div>
                                    <p class="mt-2 fs-110 fw-400">{{item.caption | translate}}</p>
                                    <a [href]="item.href" target="_blank"
                                        class="d-inline-block bg-white dark-text py-3 px-5 rounded-3 mt-3 fs-90">{{"learn_more"
                                        |
                                        translate}} <span class="visually-hidden">{{"about" | translate}}
                                            {{item.label}}</span></a>
                                </div>
                            </span>

                            <span class="col-sm-4 col-md-5">
                                <img [src]="item.image" width="100%" height="100%"
                                    [alt]="('alt_offers' | translate)+item.label" loading="lazy" />
                            </span>
                        </div>
                    </div>
                </span>
            </div>
        </div>

        <div class="container-xl mt-5">
            <!-- <app-promotions></app-promotions> -->
        </div>

        <div class="my-5 third-bg py-5 home-section" id="home-reviews">
            <div class="container-xl py-5">
                <app-reviews></app-reviews>
            </div>
        </div>

        <div class="container-xl py-5 home-section" id="home-more">
            <app-reasons></app-reasons>
            <div class="mt-5 pt-3">
                <app-blog-posts-preview></app-blog-posts-preview>
            </div>
        </div>
    </ng-container>
</div>
