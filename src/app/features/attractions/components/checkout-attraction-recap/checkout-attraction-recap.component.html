<ng-container *ngIf="data">
    <div class="bg-white rounded-3 p-3 shadow-sm">
        <div class="position-relative bg-white rounded-3 shadow-sm rounded-3 overflow-hidden">
            <app-city-image [city]="data?.activity?.City" [height]="'250px'"></app-city-image>
            <div class="position-absolute top-0 start-0 text-white w-100 h-100 bg-dark bg-opacity-10">
                <div class="h-100 p-4 opacity-75">
                    <div>
                        <div class="fs-120">
                            {{"your_trip_to" | translate}}
                        </div>
                        <div class="fs-1 fw-medium">{{data?.activity?.City}}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-3 overflow-hidden shadow-sm mt-4 p-3">
        <div class="row">
            <span class="col-md-4 my-1">
                <div>
                    <img class="rounded-3" [src]="data.activity.Image" width="100%" height="100%" />
                </div>
            </span>

            <span class="col-md-7 my-1">
                <div>
                    <div class="fw-300 main-text">{{data.activity.Type}}</div>
                    <div class="fs-110 fw-400">{{data.activity.Name}}</div>
                    <div class="fs-80 fw-300 text-secondary"> {{ data.activity.City}},
                        {{data.activity.Country}}</div>
                </div>
            </span>
        </div>
        <hr class="border-secondary w-100 my-4" />
        <div class="d-flex gap-2">
            <span class="w-50 text-start">
                <div>{{"start" | translate}}</div>
                <div class="fs-120 fw-medium"> {{data.dateFrom | date:'MMMM dd, Y'}}</div>
            </span>
            <span>
                <div class="width-2 height-50 grey-bg"></div>
            </span>
            <span class="w-50 text-end">
                <div>{{"end" | translate}}</div>
                <div class="fs-120 fw-medium"> {{data.dateTo | date:'MMMM dd, Y'}}</div>
            </span>
        </div>
        <!-- <hr class="border-secondary w-100 my-4" />
        <div class="mt-3">
            <app-promo-code></app-promo-code>
        </div> -->
    </div>
    <div class="mt-4">
        <app-checkout-summary [price]="data?.totalAmount"></app-checkout-summary>
    </div>
</ng-container>
