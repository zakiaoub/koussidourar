<div class="my-3 border p-4 rounded-3">
    <div class="fs-5 fs-110 fw-500">{{"meeting_point" | translate}}</div>
    <div class="mt-3">

        <div class="d-flex align-items-center">
            <span>
                <img src="assets/icons/map.png" [width]="40" [height]="40" />
            </span>
            <span class="mx-3">
                <div>{{"pick_up" | translate}}</div>
                <div class="fw-300">{{data.startingPoints.Adress}}</div>
            </span>
        </div>

        <div class="d-flex align-items-center my-4">
            <span>
                <img src="assets/icons/tourist.png" [width]="40" [height]="40" />
            </span>
            <span class="mx-3">
                <div>{{"arrival" | translate}}</div>
                <div class="fw-300">{{data.startingPoints.Name}}</div>
            </span>
        </div>

        <div class="d-flex align-items-center">
            <span>
                <img src="assets/icons/station.png" [width]="40" [height]="40" />
            </span>
            <span class="mx-3">
                <div>{{"drop_off" | translate}}</div>
                <div class="fw-300">{{data.endPoints}}</div>
            </span>
        </div>
    </div>
</div>
