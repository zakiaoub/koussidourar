<ng-container>
    <div class="text-center d-flex justify-content-center align-items-center">
        <span>
            <img src="https://a0.muscache.com/airbnb/static/packages/assets/frontend/pdp-shared/components/LaurelItem/ic-system-gf-gold-left-laurel-32-3x.d074c7557225d2a0f3f1289a3dde7a7d.png"
                [width]="54" [height]="96" />
        </span>
        <span class="mx-5">
            <div class="fs-2">{{"your_rank" | translate}}</div>
            <div class="main-text lh-1">
                <div class="fs-110">{{data.rank | translate}}</div>
                <div class="mt-3">
                    <img [src]="'assets/icons/'+data.rank+'-badge.png'" [width]="120" [height]="120" />
                </div>
            </div>
        </span>
        <span>
            <img src="https://a0.muscache.com/airbnb/static/packages/assets/frontend/pdp-shared/components/LaurelItem/ic-system-gf-gold-right-laurel-32-3x.f972b95c999d29e144d9ef970585906d.png"
                [width]="54" [height]="96" />
        </span>
    </div>
    <div class="mt-5">
        <div class="row row-gap-3">
            <span class="col-lg-6">
                <div class="d-flex align-items-center gap-4 border rounded-4 shadow-sm p-3">
                    <span class="w-100">
                        <div class="fw-medium">{{"your_next_millestone" | translate}}</div>
                        <div class="mt-2">
                            <p-progress-bar [value]="data?.earnings | percent:data?.nextRankEarnings"></p-progress-bar>
                        </div>
                        <div class="mt-1 fs-90 opacity-75 d-flex justify-content-between gap-3">
                            <span>{{data?.nextRankEarnings - data?.earnings}}$</span>
                            <span>{{"up_to_next_level" | translate}}</span>
                        </div>
                    </span>
                    <span class="size-60 third-bg rounded-circle fs-4 main-text">
                        <app-icon [icon]="'trophy-fill'"></app-icon>
                    </span>
                </div>
            </span>

            <span class="col-lg-6">
                <div class="d-flex align-items-center gap-4 border rounded-4 shadow-sm p-3">
                    <span class="w-100">
                        <div class="fw-medium">{{"your_compagn_target" | translate}}</div>
                        <div class="mt-2">
                            <p-progress-bar
                                [value]="data?.earnings | percent:data?.goldLevel | fixed:1"></p-progress-bar>
                        </div>
                        <div class="mt-1 fs-90 opacity-75 d-flex justify-content-between gap-3">
                            <span>{{data?.goldLevel - data?.earnings}}$</span>
                            <span>{{"to_reach_gold_level" | translate}}</span>
                        </div>
                    </span>
                    <span class="size-60 third-bg rounded-circle fs-4 main-text">
                        <app-icon [icon]="'bullseye'"></app-icon>
                    </span>
                </div>
            </span>
        </div>
    </div>
</ng-container>
