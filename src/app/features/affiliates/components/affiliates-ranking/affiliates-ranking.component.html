<div class="grey-bg rounded p-5">
    <div class="fs-4 text-center">{{"global_ranking" | translate}}</div>
    <div class="row justify-content-center align-items-center mt-4">
        <span class="col-md-3" *ngFor="let item of data; let i = index" [ngClass]="{
      'order-2': i === 0,
      'order-1': i === 1,
      'order-3': i === 2
    }">
            <div class="border bg-white rounded-4 shadow-sm d-flex flex-column align-items-center"
                [ngClass]="{'p-4':i === 0, 'p-3':i !== 0}">
                <div class="size-85 position-relative">
                    <div [ngClass]="item.rank" class="rounded-circle">
                        <img class="rounded-circle" [src]="item.image" width="100%" height="100%" />
                    </div>
                    <div class="position-absolute bottom-0 d-flex justify-content-center pt-5">
                        <div class="size-30 rounded-circle shadow-sm text-white fs-90" style="margin-bottom: -10px;"
                            [ngClass]="item.rank">
                            {{i+1}}
                        </div>
                    </div>
                </div>
                <div class="mt-3 fw-medium">{{item.name}}</div>
                <img [src]="'assets/icons/'+item.rank+'-badge.png'" [width]="45" [height]="45" />
                <div class="d-flex gap-2 grey-bg py-2 px-3 rounded-3 mt-3">
                    <span>
                        <img src="https://cdn-icons-png.flaticon.com/128/15323/15323844.png" [width]="20" [height]="20">
                    </span>
                    <span class="fw-medium">
                        {{item.earnings}}$
                    </span>
                </div>
            </div>
        </span>
    </div>
</div>
