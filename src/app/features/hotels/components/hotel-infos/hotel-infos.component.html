<div class="row g-2">
    <span *ngFor="let field of infos" class="col-6 col-md-3 my-3">
        <div class="d-flex align-items-center">
            <span class="border rounded-3 p-3">
                <img [src]="field.icon" [width]="20" [height]="20" />
            </span>
            <span class="mx-3">
                <div class="text-secondary fs-80">{{ field.key | translate }}</div>
                <div class="mt-1 fs-90" *ngIf="data[field.key]">
                    {{ field.format ? field.format(data[field.key]) : data[field.key].slice(0,14) }}
                    <span class="orange-text" *ngIf="field.key === 'category'">
                        <app-icon icon="star-fill"></app-icon>
                    </span>
                </div>
                <div class="fs-90" *ngIf="!data[field.key]">
                    {{ "not_assigned" | translate }}
                </div>
            </span>
        </div>
    </span>
</div>
