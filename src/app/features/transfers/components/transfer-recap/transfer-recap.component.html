<div class="bg-white border border-primary border-2 rounded-4">
    <div class="p-4">
        <div class="fs-4 fw-medium">{{data.transfer.Trip[0].From}} - {{data.transfer.Trip[0]?.To}}</div>
        <div class="text-secondary">
            <ng-container *ngIf="data.transfer.Trip.length === 1">
                {{"one_way" | translate}}
            </ng-container>
            <ng-container *ngIf="data.transfer.Trip.length > 1">
                {{"round_trip" | translate}}
            </ng-container>
        </div>
        <ng-container>
            <div class="my-3">
                <div>{{"adults" | translate}}</div>
                <div class="fs-90 text-secondary">x{{ countAdults }}</div>
            </div>

            <div class="my-3">
                <div>{{"childs" | translate}}</div>
                <div class="fs-90 text-secondary">x{{ countChildren }}</div>
            </div>

            <hr class="border-secondary my-4" />
            <app-product-cancellation-policy [data]="data.cancellationPolicy" />
        </ng-container>
    </div>
    <div class="grey-bg p-4 rounded-bottom-4">
        <div class="row justify-content-between align-items-center">
            <span class="col-6">
                <div class="fs-80 text-secondary">
                    <div>{{"total_amount" | translate}}</div>
                    <div class="fs-2 fw-bold text-dark">
                        <app-amount [value]="data.transfer.Total"></app-amount>
                    </div>
                    <div>
                        {{"taxes_included" | translate}}
                    </div>
                </div>
            </span>
            <span class="col-6 col-sm-4 col-lg-3 col-xl-3">
                <div class="d-flex justify-content-end">
                    <app-button [type]="'button'" [title]="'book_now'"
                        [class]="'main-bg text-white p-3 rounded-5 width-160'" [isLoading]="isLoading"
                        (action)="onSubmit()"></app-button>
                </div>
            </span>
        </div>
    </div>
</div>
