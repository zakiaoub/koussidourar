<div class="bg-white rounded-4 p-3 d-none d-lg-block mb-4">
    <div class="d-flex justify-content-between align-items-center gap-3">
        <span *ngFor="let item of (data.items | keyvalue).slice(0,3)" class="w-25 border-end pe-4">
            <div role="button" class="item d-flex align-items-center gap-2 rounded-3 p-2"
                [ngClass]="{'third-bg': selectedDate === item.key}" (click)="selectDate(item.key.toString())"
                [pTooltip]="airlines | filter:item.value['carrierCode']:'name'">
                <span>
                    <img [src]="airlines | filter:item?.value['carrierCode']:'logo'" [width]="45" [height]="45"
                        class="rounded-circle">
                </span>
                <span>
                    <div class="fw-medium">{{item?.key.toString() | date:'MMMM dd'}}</div>

                    <div class="fs-90 green-text">
                        <app-amount [value]="item?.value?.['price']"></app-amount>
                    </div>
                </span>
            </div>
        </span>
        <span class="w-25">
            <div class="d-flex align-items-center gap-2">
                <span class="main-text fs-110">
                    <app-icon icon="calendar2-week"></app-icon>
                </span>
                <span>
                    <div class="fw-medium">{{"the_best_price" | translate}} ?</div>
                    <div class="fs-80 text-secondary">{{"calendar_caption" | translate}}</div>
                </span>
            </div>
        </span>
    </div>
</div>
