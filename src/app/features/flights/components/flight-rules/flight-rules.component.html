<div class="bg-white shadow-sm p-3 rounded-3 my-4" *ngIf="data">
    <div class="fw-medium fs-110">{{ "conditions" | translate }}</div>

    <div class="mt-3">
        <div *ngFor="let item of data.slice(0, visibleCount); let i = index" class="my-1 fs-90">
            <div><span class="fw-medium">{{ i + 1 }}.</span> {{ item.Value }}</div>
        </div>

        <app-button [type]="'button'" *ngIf="visibleCount < data.length"
            [class]="'bg-white main-border main-text rounded-5 p-3 fs-90 mt-3 width-160'" [title]="'view_more'"
            (action)="loadMore()" [isLoading]="IsClicked"></app-button>
    </div>
</div>
