<div class="row justify-content-center">
    <span [ngClass]="class">
        <ng-container>
            <div *ngIf="isImage">
                <img src="assets/illustrations/noresults.svg" width="100%" height="100%" />
            </div>
            <div class="text-center mt-2">
                <div class="fs-5" [innerHTML]="'no_results_found' | translate"></div>
                <p class="opacity-75 mt-1" *ngIf="isCaption">{{"no_results_found_caption" | translate}}</p>
            </div>
        </ng-container>
    </span>
</div>
