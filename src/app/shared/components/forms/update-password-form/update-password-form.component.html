<ng-container>

    <form [formGroup]="upadateForm" (ngSubmit)="onUpdate()" [className]="updateClass">
        <div class="row row-gap-4">
            <ng-container *ngFor="let field of updateFields">
                <span [class]="field.col">
                    <app-password-field [id]="field.id" [labelKey]="field.label"
                        [controlName]="field.formControlName" [icon]="field.icon" [minlength]="field.minlength"
                        [maxlength]="field.maxlength" [toggleMask]="field.toggleMask" [feedback]="field.feedback"
                        [showMessage]="field.showMessage" [formGroup]="upadateForm"></app-password-field>
                </span>
            </ng-container>
        </div>
        <div class="mt-5">
            <app-button [type]="'submit'" [title]="'reset'"
                [class]="'main-border main-bg text-white p-3 rounded-3 w-100'" [isLoading]="isUpdateSubmiting()"></app-button>
        </div>
    </form>

    <form [formGroup]="validateForm" (ngSubmit)="onValidate()" [className]="validateClass">

        <div class="row row-gap-3">
            <ng-container *ngFor="let field of validateFields">
                <span [class]="field.col">
                    <app-input-field [id]="field.id" [labelKey]="field.label" [controlName]="field.formControlName"
                        [icon]="field.icon" [type]="field.type" [placeholder]="field.placeholder"
                        [readonly]="field.readonly" [minlength]="field.minlength" [maxlength]="field.maxlength"
                        [keyFilter]="field.keyFilter" [showMessage]="field.showMessage" [formGroup]="validateForm">
                    </app-input-field>
                </span>
            </ng-container>
            <div class="mt-5">
                <app-button [type]="'submit'" [title]="'validate'"
                    [class]="'main-border main-bg text-white p-3 rounded-3 w-100'" [isLoading]="isValidateSubmiting()"></app-button>
            </div>
        </div>
    </form>
</ng-container>
