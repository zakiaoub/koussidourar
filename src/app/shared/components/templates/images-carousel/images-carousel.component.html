<div role="button" class="position-relative pointer w-100" (click)="displayBasic = true">
    <div class="row">
        <span class="col-md-4">
            <div class="h-100">
                <img class="rounded-4" [src]="data[0]" width="100%" height="100%"
                    style="max-height: 560px;min-height: 560px;" />
            </div>
        </span>
        <span class="col-md-4 d-none d-md-block">
            <div class="h-100">
                <div class="row flex-column justify-content-between" style="gap: 20px;">
                    <span class="col-12">
                        <img style="max-height: 270px;min-height: 270px;" class="rounded-4" [src]="data[1]" width="100%"
                            height="100%" />
                    </span>
                    <span class="col-12">
                        <img style="max-height: 270px;min-height: 270px;" class="rounded-4" [src]="data[2]" width="100%"
                            height="100%" />
                    </span>
                </div>
            </div>
        </span>

        <span class="col-md-4 d-none d-md-block">
            <div class="h-100">
                <img class="rounded-4" [src]="data[3]" width="100%" height="100%"
                    style="max-height: 560px;min-height: 560px" />
            </div>
        </span>
    </div>

    <div class="position-absolute bottom-0 end-0 m-5">
        <div class="button d-flex align-items-center py-3 px-4 rounded-5">
            <span>
                <app-icon icon="grid"></app-icon>
            </span>
            <span class="border-white ms-2 fs-90">{{data.length}} {{"other_photos" | translate}}</span>
        </div>
    </div>
</div>

<div class="images-carousel">
    <p-galleria [value]="data" [(visible)]="displayBasic" [containerStyle]="{ 'max-width': '100%' }"
        [numVisible]="data.length" [circular]="true" [fullScreen]="true" [showItemNavigators]="true"
        [showThumbnails]="false">
        <ng-template pTemplate="item" let-item>
            <img [src]="item" style="width: 100%; display: block;" />
        </ng-template>
    </p-galleria>
</div>
