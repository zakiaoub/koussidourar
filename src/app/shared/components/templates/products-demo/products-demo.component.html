<section class="py-5">
    <h2 class="fs-1 fw-600">{{"how_it_works" | translate}}</h2>
    <p class="text-secondary">{{"just_4_steps" | translate}}</p>
    <div class="row justify-content-between align-items-center mt-5">
        <span class="col-lg-4">
            <div *ngFor="let item of data.slice(0,2)" class="d-flex align-items-start my-5">
                <span class="bg-white shadow p-3 rounded-3">
                    <img [src]="item.img" [width]="35" [height]="35" />
                </span>
                <span class="mx-3">
                    <div class="fw-400 fs-4">{{item.title | translate}}</div>
                    <p class="text-secondary mt-1">{{item.caption | translate}}</p>
                </span>
            </div>
        </span>

        <span class="d-none d-lg-block col-lg-3">
            <div>
                <img src="https://travila-demos.vercel.app/assets/imgs/page/homepage6/man.png" width="100%"
                    height="100%" />
            </div>
        </span>

        <span class="col-lg-4">
            <div *ngFor="let item of data.slice(2,4)" class="d-flex align-items-start my-5">
                <span class="bg-white shadow p-3 rounded-3">
                    <img [src]="item.img" [width]="35" [height]="35" />
                </span>
                <span class="mx-3">
                    <div class="fw-400 fs-4">{{item.title | translate}}</div>
                    <p class="text-secondary mt-1">{{item.caption | translate}}</p>
                </span>
            </div>
