<ng-container *ngIf="data"  >
    <div class="fs-5 fs-110 fw-500">{{ title | translate }}</div>

    <div class="mt-3 mh200">
        <div *ngFor="let item of data" class="my-1 fw-300">
            <div [innerHTML]="item.Value.replaceAll(stringReplace, '<br>')"></div>
        </div>
    </div>
</ng-container>
