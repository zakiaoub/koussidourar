<ng-container>
    <div class="fs-5 fs-110 fw-500">{{"whats_included" | translate}}</div>
    <div class="mt-3">
        <div class="row">
            <span class="col-sm-6">
                <div class="d-flex align-items-center my-2" *ngFor="let item of included">
                    <span>
                        <img src="assets/icons/status/success.png" [width]="15" [height]="15" />
                    </span>
                    <span class="mx-2 fw-300">{{item.Value}}</span>
                </div>
            </span>

            <span class="col-sm-6">
                <div class="d-flex align-items-center my-2" *ngFor="let item of excluded">
                    <span class="red-text">
                        <img src="assets/icons/status/failure.png" [width]="15" [height]="15" />
                    </span>
                    <span class="mx-2 fw-300">{{item.Value}}</span>
                </div>
            </span>
        </div>
    </div>
</ng-container>
