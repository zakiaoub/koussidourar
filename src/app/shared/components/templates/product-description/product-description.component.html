<ng-container>
    <div class="fs-110 fw-500">{{title | translate}}</div>
    <p class="mt-3" [innerHTML]="visibleText"></p>
    <button role="button" (click)="toggleText()" class="p-0 bg-white blue-text text-decoration-underline">
        {{ showAll ? ('show_less' | translate) : ('show_more' | translate) }}
    </button>
</ng-container>
