<div class="row row-gap-4 justify-content-between align-items-end">
    <span class="col-lg-6">
        <ng-container>
            <div class="main-text fw-300 fs-5 text-uppercase">{{service | translate}}</div>
            <div class="fw-600 mt-3 fs-300" [innerHTML]="title | translate"></div>
            <p class="fs-5 mt-2 text-secondary">{{caption | translate}}</p>
        </ng-container>
        <div class="d-flex align-items-center gap-3 my-4" *ngFor="let item of data">
            <span class="border p-2 rounded-3">
                <img [src]="item.img" [alt]="'Illustration of'+item.title" [width]="30" [height]="30" />
            </span>
            <span>
                <div class="fw-medium">{{item.title | translate}}</div>
                <div class="text-secondary">{{item.caption | translate}}</div>
            </span>
        </div>
    </span>
    <span [class]="class">
        <ng-container *ngTemplateOutlet="image"></ng-container>
    </span>
</div>
