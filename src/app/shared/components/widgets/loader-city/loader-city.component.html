<div class="loader-city" *ngIf="city">
    <p-dialog [modal]="true" [(visible)]="visible" [style]="{ width: '30rem' }" [draggable]="false" [closable]="false">
        <ng-template #headless>
            <div class="position-relative">
                <app-city-image [city]="city" [height]="height"></app-city-image>

                <div class="position-absolute top-0 d-flex flex-column justify-content-between w-100 h-100">
                    <div class="p-3">
                        <div
                            class="fs-90 fw-medium text-capitalize p-3 bg-white bg-opacity-75 rounded-3 d-flex justify-content-between align-items-center">
                            <span class="d-flex align-items-center gap-2">
                                <app-icon icon="geo-alt"></app-icon>
                                {{city}}, {{country}}
                            </span>
                            <span class="spinner"></span>
                        </div>
                    </div>

                    <div class="gradient py-3 px-4">
                        <div class="row justify-content-between align-items-center">
                            <span class="col-8">
                                <p class="fs-5 text-white fw-medium">{{"loader_text" | translate}}</p>
                            </span>
                            <span class="col-2">
                                <img src="assets/icon-light.png" alt="Website logo" class="logo-image" width="100%" height="100%" />
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </ng-template>
    </p-dialog>
</div>
