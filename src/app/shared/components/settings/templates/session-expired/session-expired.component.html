<p-dialog header="Edit Profile" [modal]="true" [(visible)]="visible" [style]="{ width: '30rem' }" [closable]="false">
    <ng-template #headless>
        <div class="p-5 text-center">
            <img [src]="'https://cdn-icons-png.flaticon.com/128/2972/2972543.png'" [width]="85" [height]="85">
            <div class="fs-3 fw-medium mt-2" [innerHTML]="'session_expired_text' | translate"></div>
            <div class="d-flex flex-column gap-3 mt-4">
                <a [href]="services[target]" class="d-block main-border main-text rounded-3 p-3">{{"new_search" |
                    translate}}</a>
                <app-button [class]="'main-border main-bg text-white rounded-3 p-3 w-100'"
                    [title]="'refresh_the_search'" (action)="refreshSearch()">
                </app-button>
            </div>
        </div>
    </ng-template>
</p-dialog>
