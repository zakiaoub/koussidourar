<div [ngSwitch]="service" class="container-md py-5">
    <ng-container *ngSwitchCase="'flight'">
        <div class="row row-gap-3 justify-content-between tems-center">
            <span class="col-lg-9">
                <div class="bg-white bg-white overflow-hidden mb-4 shadow rounded-3">
                    <div *ngFor="let item of [].constructor(2);">
                        <div class="lower-bg p-3">
                            <span class="d-flex align-items-center gap-3">
                                <p-skeleton width="90px" height="40px" styleClass="rounded-2" />

                                <span class="d-flex align-items-center gap-4 mt-1 fw-medium  text-white">
                                    <span>
                                        <p-skeleton width="250px" height="25px" styleClass="rounded-2" />
                                    </span>
                                    <span>
                                        <img src="assets/icons/plane.png" [width]="20" [height]="20" />
                                    </span>
                                    <span>
                                        <p-skeleton width="250px" height="25px" styleClass="rounded-2" />
                                    </span>
                                </span>
                            </span>
                        </div>
                        <ng-container *ngFor="let item of [].constructor(2); let last = last; let s = index">
                            <div class="p-4">
                                <div class="row align-items-end">
                                    <span class="col-xl-8">
                                        <div class="d-flex gap-4">
                                            <span class="d-flex flex-column justify-content-between">
                                                <div>
                                                    <div>
                                                        <p-skeleton width="50px" height="25px" styleClass="rounded-2" />
                                                    </div>
                                                    <div class="mt-2">
                                                        <p-skeleton width="70px" height="20px" styleClass="rounded-2" />
                                                    </div>
                                                </div>

                                                <div>
                                                    <div>
                                                        <p-skeleton width="50px" height="25px" styleClass="rounded-2" />
                                                    </div>
                                                    <div class="mt-2">
                                                        <p-skeleton width="70px" height="20px" styleClass="rounded-2" />
                                                    </div>
                                                </div>

                                                <div>
                                                    <div>
                                                        <p-skeleton width="50px" height="25px" styleClass="rounded-2" />
                                                    </div>
                                                    <div class="mt-2">
                                                        <p-skeleton width="70px" height="20px" styleClass="rounded-2" />
                                                    </div>
                                                </div>
                                            </span>
                                            <span>
                                                <div
                                                    class="d-flex flex-column justify-content-between align-items-center gap-2 main-text">
                                                    <app-icon icon="dot"></app-icon>

                                                    <div class="width-2 height-30 bg-secondary bg-opacity-25"></div>

                                                    <p-skeleton width="30px" height="30px"
                                                        styleClass="rounded-circle" />

                                                    <div class="width-2 height-30 bg-secondary bg-opacity-25"></div>

                                                    <app-icon icon="dot"></app-icon>
                                                </div>
                                            </span>
                                            <span class="d-flex flex-column justify-content-between">
                                                <div>
                                                    <div>
                                                        <p-skeleton width="350px" height="30px"
                                                            styleClass="rounded-2" />
                                                    </div>
                                                    <div class="mt-2">
                                                        <p-skeleton width="90px" height="20px" styleClass="rounded-2" />
                                                    </div>
                                                </div>

                                                <div>
                                                    <div>
                                                        <p-skeleton width="60px" height="20px" styleClass="rounded-2" />
                                                    </div>
                                                    <div class="mt-2">
                                                        <p-skeleton width="120px" height="30px"
                                                            styleClass="rounded-2" />
                                                    </div>
                                                </div>

                                                <div>
                                                    <div>
                                                        <p-skeleton width="350px" height="30px"
                                                            styleClass="rounded-2" />
                                                    </div>
                                                    <div class="mt-2">
                                                        <p-skeleton width="90px" height="20px" styleClass="rounded-2" />
                                                    </div>
                                                </div>
                                            </span>
                                        </div>
                                    </span>
                                    <span class="col-xl-4">
                                        <div class="row justify-content-between row-gap-3">
                                            <span class="col-xl-12"
                                                *ngFor="let item of [].constructor(4); let i = index">
                                                <div class="d-flex align-items-end gap-2">
                                                    <span class="text-secondary">
                                                        <p-skeleton width="100px" height="20px"
                                                            styleClass="rounded-2" />
                                                    </span>
                                                    <span class="text-dark">

                                                    </span>
                                                </div>
                                            </span>
                                        </div>
                                    </span>
                                </div>
                            </div>

                            <div class="px-3" *ngIf="!last">
                                <p-skeleton width="100%" height="50px" styleClass="rounded-2" />
                            </div>
                        </ng-container>
                    </div>
                </div>
            </span>
            <span class="col-lg-3 d-none d-lg-block">
                <div class="bg-white rounded-4 w-100 text-dark p-2 shawdow-sm">
                    <p-skeleton width="100%" height="160px" styleClass="rounded-2" />
                    <div class="my-1">
                        <p-skeleton width="100%" height="45px" styleClass="rounded-2" />
                    </div>
                    <div class="my-1">
                        <p-skeleton width="100%" height="45px" styleClass="rounded-2" />
                    </div>
                    <div class="my-1">
                        <p-skeleton width="100%" height="45px" styleClass="rounded-2" />
                    </div>
                </div>

            </span>
        </div>
    </ng-container>

    <ng-container *ngSwitchDefault>
        <div class="row">
            <span class="col-4">
                <div class="h-100">
                    <p-skeleton width="100%" height="560px" styleClass="rounded-2" />
                </div>
            </span>
            <span class="col-4">
                <div class="h-100">
                    <div class="row flex-column justify-content-between" style="gap: 20px;">
                        <span class="col-12">
                            <p-skeleton width="100%" height="270px" styleClass="rounded-2" />
                        </span>
                        <span class="col-12">
                            <p-skeleton width="100%" height="270px" styleClass="rounded-2" />
                        </span>
                    </div>
                </div>
            </span>

            <span class="col-4">
                <div class="h-100">
                    <p-skeleton width="100%" height="560px" styleClass="rounded-2" />
                </div>
            </span>
        </div>
        <div class="row flex-xl-row flex-sm-column-reverse">
            <span class="col-xl-8 my-3">
                <div class="pe-xl-4">
                    <div class="row">
                        <span *ngFor="let item of [].constructor(4)" class="col-6 col-md-3 my-3">
                            <div class="d-flex align-items-center">
                                <span class="border rounded-3 p-3">
                                    <p-skeleton width="25px" height="25px" styleClass="rounded-2" />
                                </span>
                                <span class="mx-3">
                                    <div>
                                        <p-skeleton width="5rem" height="20px" styleClass="rounded-2" />
                                    </div>
                                    <div class="mt-2">
                                        <p-skeleton width="50%" height="20px" styleClass="rounded-2" />
                                    </div>
                                </span>
                            </div>
                        </span>
                    </div>

                    <hr class="border-secondary my-4" />

                    <ng-container>
                        <div class="fs-5 fs-110 fw-500">{{"overview" | translate}}</div>
                        <div class="mt-3">
                            <div class="my-1">
                                <p-skeleton width="100%" class="mb-2" />
                            </div>
                            <div class="my-1">
                                <p-skeleton width="90%" class="mb-2" />
                            </div>
                            <div class="my-1">
                                <p-skeleton width="75%" class="mb-2" />
                            </div>
                            <div class="my-1">
                                <p-skeleton width="95%" class="mb-2" />
                            </div>
                            <div class="my-1">
                                <p-skeleton width="25%" class="mb-2" />
                            </div>
                        </div>
                    </ng-container>
                </div>
            </span>
            <span class="col-xl-4 my-3">
                <p-skeleton width="100%" height="340px" class="mb-2" />
            </span>
        </div>
    </ng-container>
</div>

<app-referral-ad [dailyLimit]="false"></app-referral-ad>
