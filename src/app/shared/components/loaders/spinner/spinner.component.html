<ng-container>
    <span class="spinner-white" *ngIf="isWhite" [style.width.px]="size" [style.height.px]="size" [style.borderWidth.px]="stroke"></span>
    <span class="spinner-dark" *ngIf="!isWhite" [style.width.px]="size" [style.height.px]="size" [style.borderWidth.px]="stroke"></span>
</ng-container>
