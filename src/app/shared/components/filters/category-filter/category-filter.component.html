<ng-container>
    <div class="fw-400 lower-text">{{ 'property_class' | translate }}</div>
    <div class="row mt-2">
        <span *ngFor="let item of filterList; let i = index" class="col-xl-3 p-1">
            <div role="button" class="rounded-3 p-2 d-flex justify-content-center align-items-center"
                (click)="toggleSelection('category-'+item.id)"
                [ngClass]="{'main-border third-bg': selectedItems.includes('category-'+item.id), 'border': !selectedItems.includes('category-'+item.id)}">
                <span class="me-1" [ngClass]="{'fw-300 fs-90':i === 0}">
                    {{item.name}}
                </span>
                <span *ngIf="i !== 0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" stroke="#FFB700"
                        fill="#FFB700" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-star">
                        <path
                            d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z" />
                    </svg>
                </span>
            </div>
        </span>
    </div>
</ng-container>
